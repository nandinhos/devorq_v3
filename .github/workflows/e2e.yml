name: E2E

on:
  push:
    branches: [main, dev, master]
  pull_request:
    branches: [main, dev, master]
  merge_group:
  workflow_dispatch:

# E2E workflow — roda Playwright em todo push e PR contra main/dev/master.
#
# Status atual (v3.8.5):
#   - Ja bloqueia PRs via exit code (Playwright retorna !=0 em falha).
#   - NAO e required check ainda — branch protection em GitHub Settings
#     precisa listar "E2E / Playwright E2E" explicitamente. Passo
#     manual (admin-only) — ver docs/CI-GATING.md.
#
# v3.8.7+: promocao a required check (story-001 do handoff).
#
# Concurrency: cancela runs antigos do mesmo PR/branch para economizar
# minutos de CI quando o dev faz force-push.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e-tests/package-lock.json

      - name: Install dependencies
        working-directory: e2e-tests
        run: npm ci --no-fund --no-audit

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e-tests
        env:
          CI: 'true'
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e-tests/test-results/
          retention-days: 7
