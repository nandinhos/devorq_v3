name: CI

on:
  push:
    branches: [main, dev, master]
  pull_request:
    branches: [main, dev, master]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup environment
        run: |
          # Instalar jq se não existir
          which jq || sudo apt-get update && sudo apt-get install -y jq

      - name: Run CI Test Suite
        run: bash scripts/ci-test.sh

      - name: Run devorq self-test
        run: |
          export DEVORQ_ROOT="$PWD"
          export DEVORQ_DIR="$PWD"
          bash bin/devorq test

      - name: Run devorq ddd validate
        run: |
          export DEVORQ_ROOT="$PWD"
          export DEVORQ_DIR="$PWD"
          bash bin/devorq ddd validate

  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck (gating em erros)
        run: |
          shellcheck --version
          # GATE real (sem '|| true'): bloqueia em ERROS de shellcheck.
          # Warnings sao baseline conhecido e nao bloqueiam (--severity=error).
          # Cobertura ampla: bin + todo lib/scripts/skills (antes so lib/*.sh de topo).
          shellcheck -x --severity=error \
            bin/devorq \
            $(find lib scripts skills -name '*.sh' -type f)
